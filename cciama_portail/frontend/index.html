<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portail Officiel — CCIAMA Tchad</title>
    <meta name="description" content="Portail officiel de la Chambre de Commerce, d'Industrie, d'Agriculture, des Mines et de l'Artisanat du Tchad." />
    <link rel="icon" type="image/png" href="/cciama-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>

    <!-- Direction d'écriture appliquée avant le rendu React (évite le flash LTR→RTL en arabe) -->
    <script type="text/javascript">
      (function () {
        var m = document.cookie.match(/googtrans=\/[a-z]+\/([a-z]+)/);
        if (m) {
          document.documentElement.lang = m[1];
          if (m[1] === 'ar') document.documentElement.dir = 'rtl';
        }
      })();
    </script>

    <!-- Traduction gratuite via le widget Google Website Translate (piloté par le sélecteur de langue) -->
    <div id="google_translate_element" aria-hidden="true"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'fr', includedLanguages: 'fr,ar,en', autoDisplay: false },
          'google_translate_element'
        );
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
