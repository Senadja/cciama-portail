version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cciama-postgres
    ports:
      - '5439:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cciama_db
    volumes:
      - cciama-pgdata:/var/lib/postgresql/data
    networks:
      - cciama-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cciama-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    networks:
      - cciama-network
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: cciama-keycloak
    command: start-dev
    ports:
      - '8080:8080'
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    networks:
      - cciama-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: cciama-minio
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    networks:
      - cciama-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cciama-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitdata:/var/lib/rabbitmq
    networks:
      - cciama-network
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: cciama-meilisearch
    ports:
      - '7701:7700'
    environment:
      MEILI_MASTER_KEY: meilisearch_master_key_123456
      MEILI_ENV: development
    volumes:
      - meilidata:/meili_data
    networks:
      - cciama-network
    restart: unless-stopped

volumes:
  cciama-pgdata:
    driver: local
  redisdata:
    driver: local
  miniodata:
    driver: local
  rabbitdata:
    driver: local
  meilidata:
    driver: local

networks:
  cciama-network:
    driver: bridge
